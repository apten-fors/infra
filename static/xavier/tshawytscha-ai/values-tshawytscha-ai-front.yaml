image:
  repository: registry.luxembourg-2.cloud.gcore.dev/59508-197526-76-infra/tshawytscha-ai-front
  tag: "v0.1.3"
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: gcore-registry-secret

service:
  port: 80
  targetPort: 80

httpRoute:
  enabled: true
  parentRefs:
    - name: envoy-gateway-external
      namespace: envoy-gateway-system
  hostnames:
    - tshawytscha.ai
  backendService:
    name: tshawytscha-ai-back
    port: 80

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi
