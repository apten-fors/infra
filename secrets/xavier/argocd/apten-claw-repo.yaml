apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: apten-claw-repo
  namespace: argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: eso-ro
    kind: ClusterSecretStore
  target:
    name: apten-claw-repo
    creationPolicy: Owner
    template:
      metadata:
        labels:
          argocd.argoproj.io/secret-type: repository
      data:
        name: apten-claw
        url: https://github.com/apten-fors/apten-claw.git
        type: git
        username: git
        password: "{{ .pat }}"
  data:
    - secretKey: pat
      remoteRef:
        key: secret/data/github-apten-claw
        property: github-pat
