apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: apten-claw-identity
  namespace: apten-claw
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: eso-ro
    kind: ClusterSecretStore
  target:
    name: apten-claw-identity
    creationPolicy: Owner
  data:
    - secretKey: device-auth.json
      remoteRef:
        key: secret/data/apten-claw-identity
        property: device-auth.json
    - secretKey: device.json
      remoteRef:
        key: secret/data/apten-claw-identity
        property: device.json
    - secretKey: telegram-default-allowFrom.json
      remoteRef:
        key: secret/data/apten-claw-identity
        property: telegram-default-allowFrom.json
    - secretKey: telegram-pairing.json
      remoteRef:
        key: secret/data/apten-claw-identity
        property: telegram-pairing.json
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: apten-claw-gateway
  namespace: apten-claw
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: eso-ro
    kind: ClusterSecretStore
  target:
    name: apten-claw-gateway
    creationPolicy: Owner
  data:
    - secretKey: token
      remoteRef:
        key: secret/data/apten-claw
        property: gateway-token
