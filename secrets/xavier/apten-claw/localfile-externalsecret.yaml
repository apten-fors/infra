apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: apten-claw-localfile
  namespace: apten-claw
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: eso-ro
    kind: ClusterSecretStore
  target:
    name: apten-claw-localfile
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        secrets.json: |
          {
            "gatewayAuthToken": "{{ .gatewayToken }}",
            "telegramBotToken": "{{ .telegramBotToken }}",
            "goplacesApiKey": "{{ .goplacesApiKey }}",
            "openaiApiKey": "{{ .openaiApiKey }}",
            "openaiWhisperApiKey": "{{ .openaiApiKey }}",
            "gcoreKimiApiKey": "{{ .gcoreApiKey }}",
            "braveApiKey": "{{ .braveApiKey }}"
          }
  data:
    - secretKey: gatewayToken
      remoteRef:
        key: secret/data/apten-claw
        property: gateway-token
    - secretKey: telegramBotToken
      remoteRef:
        key: secret/data/apten-claw
        property: openclaw-telegram-bot-token
    - secretKey: goplacesApiKey
      remoteRef:
        key: secret/data/apten-claw
        property: goplaces-api-key
    - secretKey: openaiApiKey
      remoteRef:
        key: secret/data/apten-claw
        property: openclaw-openai-api-key
    - secretKey: gcoreApiKey
      remoteRef:
        key: secret/data/apten-claw
        property: openclaw-gcore-api-key
    - secretKey: braveApiKey
      remoteRef:
        key: secret/data/apten-claw
        property: brave-api-key
