apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tshawytscha-ai-back
  namespace: argocd
spec:
  destination:
    namespace: 'tshawytscha-ai'
    server: 'https://kubernetes.default.svc'
  sources:
    - repoURL: 'registry.luxembourg-2.cloud.gcore.dev/59508-197526-76-infra/charts'
      chart: tshawytscha-ai-back
      targetRevision: 0.1.3
      helm:
        valueFiles:
          - $values/static/xavier/tshawytscha-ai/values-tshawytscha-ai-back.yaml
    - repoURL: 'https://github.com/apten-fors/infra.git'
      targetRevision: HEAD
      ref: values
    - repoURL: 'https://github.com/apten-fors/infra.git'
      targetRevision: HEAD
      path: secrets/xavier/tshawytscha-ai/
  project: default
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
